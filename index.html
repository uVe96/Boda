<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda y Bautizo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Animación de entrada inicial de la tarjeta completa */
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Georgia', serif; 
            background-color: #f7f3eb; 
            color: #4a4a4a; 
            text-align: center;
            padding: 20px;
            padding-bottom: 100px;        
        }
        
        .invitacion {
            border: 1px solid #e6dace; 
            padding: 40px 20px;
            max-width: 600px;
            margin: 20px auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(139, 115, 85, 0.08); 
            animation: aparecer 1.5s ease-out; 
        }
        
        .titulo-evento {
            font-family: 'Playfair Display', serif;
            color: #8b7355;
            font-size: 2.8em;
            font-weight: 600;
            margin: 15px 0;
            line-height: 1.1;
        }

        .ampersand {
            font-family: 'Georgia', serif;
            color: #a38d72;
            font-size: 2.5em;
            font-style: normal;
            margin: 20px 0 5px 0;
        }

        .nombres-protagonistas {
            font-family: 'Playfair Display', serif;
            color: #a38d72;
            font-size: 2em;
            font-style: italic;
            font-weight: 400;
            margin: 10px 0;
        }

        .subtitulo-evento {
            font-family: 'Playfair Display', serif;
            color: #8b7355;
            font-size: 1.8em;
            font-weight: 600;
            margin: 35px 0 10px 0;
            border-bottom: 1px solid #e6dace; 
            padding-bottom: 10px;
            display: inline-block;
        }

        p { 
            font-size: 1.15em; 
            line-height: 1.6; 
            color: #5a5a5a;
            padding: 0 10px;
            margin: 10px 0;
        }
        
        .fecha { 
            font-size: 1.5em; 
            font-weight: bold; 
            color: #8b7355; 
            margin: 35px 0 15px 0; 
            line-height: 1.5;
        }

        .hora {
            font-size: 1.2em;
            color: #a38d72;
            font-style: italic;
            margin-bottom: 15px;
        }

        .imagen-circular {
            width: 150px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 4px solid #f7f3eb; 
            display: block; 
            margin: 15px auto; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* CLASES PARA EL EFECTO SCROLL */
        .animar-scroll {
            opacity: 0; 
            transform: translateY(40px); 
            transition: all 0.8s ease-out; 
        }
        .animar-scroll.visible {
            opacity: 1; 
            transform: translateY(0); 
        }

        /* ESTILOS DE LA CUENTA ATRÁS */
        .contador-contenedor {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 35px 0;
        }
        .contador-item {
            background-color: #fcfbf9;
            border: 1px solid #e6dace;
            border-radius: 10px;
            padding: 12px 10px;
            min-width: 55px;
            box-shadow: 0 4px 8px rgba(139, 115, 85, 0.05);
        }
        .contador-numero {
            display: block;
            font-size: 1.8em;
            font-weight: bold;
            color: #8b7355;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }
        .contador-label {
            font-size: 0.75em;
            color: #a38d72;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            display: block;
        }

        /* ESTILOS DEL CARRUSEL DE FOTOS */
        .carrusel-contenedor {
            position: relative;
            max-width: 100%;
            margin: 20px auto 40px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(139, 115, 85, 0.15);
            border: 4px solid #f7f3eb;
        }
        .carrusel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carrusel-slide {
            min-width: 100%;
            box-sizing: border-box;
        }
        .carrusel-slide img {
            width: 100%;
            height: 350px; 
            object-fit: cover;
            display: block;
        }
        .carrusel-btn {
